services:
  - type: web
    name: soccer-stats-api
    runtime: node
    region: oregon
    plan: free
    # Install production deps first to avoid compiling native dev modules (like better-sqlite3),
    # then install minimal build tools required to run the build.
    buildCommand: npm ci --omit=dev --no-audit && npm install --no-save tsx vite esbuild typescript && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
        scope: run_and_build
      - key: DATABASE_URL
        sync: false
      - key: PORT
        value: 10000
